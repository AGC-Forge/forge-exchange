services:
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      target: deps
    working_dir: /repo
    volumes:
      - ./apps/client:/repo/apps/client
      - ./packages/db:/repo/packages/db
      - ./packages/worker-kit:/repo/packages/worker-kit
      - ./packages/antidetect:/repo/packages/antidetect
      - ./tsconfig.base.json:/repo/tsconfig.base.json
      - ./prisma.config.ts:/repo/prisma.config.ts
    environment:
      NODE_ENV: development
    command:
      [
        "sh",
        "-c",
        "pnpm --filter @forge-exchange/db generate && pnpm --filter @forge-exchange/db build && pnpm --filter @forge-exchange/antidetect build && pnpm --filter @forge-exchange/worker-kit build && pnpm --filter @forge-exchange/client dev --host 0.0.0.0 --port 3000",
      ]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: deps
    working_dir: /repo
    volumes:
      - ./apps/worker:/repo/apps/worker
      - ./packages/db:/repo/packages/db
      - ./packages/worker-kit:/repo/packages/worker-kit
      - ./packages/antidetect:/repo/packages/antidetect
      - ./tsconfig.base.json:/repo/tsconfig.base.json
      - ./prisma.config.ts:/repo/prisma.config.ts
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      MAX_BROWSERS: 2
    command:
      [
        "sh",
        "-c",
        "pnpm --filter @forge-exchange/db generate && pnpm --filter @forge-exchange/db build && pnpm --filter @forge-exchange/antidetect build && pnpm --filter @forge-exchange/worker-kit build && pnpm --filter @forge-exchange/worker dev",
      ]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

  postgres:
    ports:
      - "5432:5432" # Expose fully for dev tools (DBeaver, TablePlus)

  redis:
    ports:
      - "6379:6379" # Expose for redis-cli / RedisInsight

  # BullMQ dashboard di dev
  bull-board:
    image: deadly0/bull-board
    container_name: trafficx_bullboard
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_USE_TLS: "false"
    ports:
      - "3002:3000"
    depends_on:
      - redis
    networks:
      - trafficx_net

  # Redis GUI di dev
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: trafficx_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - trafficx_net
