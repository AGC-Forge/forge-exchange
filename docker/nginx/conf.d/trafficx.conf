# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name ${DOMAIN};

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name ${DOMAIN};

    # SSL
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers off;
    ssl_session_tickets off;
    resolver 1.1.1.1 8.8.8.8 ipv6=off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Client max body (untuk bulk import proxy)
    client_max_body_size 10M;

    # ── WebSocket — Nitro Native WS ───────────────────────
    location /_ws {
        proxy_pass         http://client:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Auth endpoints — strict rate limit ────────────────
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://client:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Webhook — relaxed rate limit ─────────────────────
    location /api/v1/billing/webhook {
        limit_req zone=webhook burst=20 nodelay;
        proxy_pass         http://client:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API endpoints — standard rate limit ───────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;
        proxy_pass         http://client:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Static assets — aggressively cached ───────────────
    location /_nuxt/ {
        proxy_pass         http://client:3000;
        proxy_cache        static_cache;
        proxy_cache_valid  200 7d;
        proxy_cache_use_stale error timeout updating;
        add_header         X-Cache-Status $upstream_cache_status;
        add_header         Cache-Control "public, max-age=604800, immutable";
    }

    # ── Grafana proxy ─────────────────────────────────────
    location /grafana/ {
        proxy_pass         http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /pgadmin/ {
        auth_basic ${PGADMIN_AUTH};
        auth_basic_user_file /etc/nginx/pgadmin.htpasswd;
        proxy_pass         http://pgadmin:80/;
        proxy_http_version 1.1;
        proxy_redirect     off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Script-Name /pgadmin;
        proxy_set_header   X-Scheme $scheme;
    }

    # ── Default — proxy ke Nuxt ───────────────────────────
    location / {
        proxy_pass         http://client:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

}
