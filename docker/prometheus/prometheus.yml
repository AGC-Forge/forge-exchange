global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'trafficx'

scrape_configs:
# Nuxt app metrics
- job_name: 'trafficx-web'
  static_configs:
  - targets: [ 'web:3000' ]
  metrics_path: '/api/metrics'

# Worker metrics
- job_name: 'trafficx-worker'
  static_configs:
  - targets: [ 'worker:9090' ]

# Redis exporter
- job_name: 'redis'
  static_configs:
  - targets: [ 'redis:6379' ]

# PostgreSQL exporter
- job_name: 'postgres'
  static_configs:
  - targets: [ 'postgres:5432' ]

# Prometheus itself
- job_name: 'prometheus'
  static_configs:
  - targets: [ 'localhost:9090' ]
