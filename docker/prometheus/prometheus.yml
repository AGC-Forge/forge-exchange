global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'trafficx'

scrape_configs:
- job_name: 'redis'
  static_configs:
  - targets: [ 'redis_exporter:9121' ]

- job_name: 'postgres'
  static_configs:
  - targets: [ 'postgres_exporter:9187' ]

# Prometheus itself
- job_name: 'prometheus'
  static_configs:
  - targets: [ 'localhost:9090' ]
