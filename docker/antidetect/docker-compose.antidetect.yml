# ============================================================
# docker/antidetect/docker-compose.antidetect.yml — FIXED v3
# PERUBAHAN:
#   - nstbrowser/agent → HAPUS (image private/tidak ada)
#   - Alternatif Docker = nstbrowser/browserless (public di Hub)
#   - AdsPower, Dolphin, Multilogin = native systemd (tidak ada image)
# ============================================================

services:
  # ── Virtual Display ─────────────────────────────────────────
  xvfb:
    image: ubuntu:22.04
    container_name: trafficx_xvfb
    restart: unless-stopped
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq xvfb &&
        Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset
      "
    environment:
      - DISPLAY=:99
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    networks:
      - antidetect_net

  # ── Nstbrowser Browserless (Docker — butuh TOKEN) ───────────
  # Image: nstbrowser/browserless (PUBLIC di Docker Hub)
  # Bukan nstbrowser/agent (tidak ada/private)
  # TOKEN wajib: dapatkan dari https://app.nstbrowser.io → Account → API Key
  nstbrowser:
    image: nstbrowser/browserless:latest
    container_name: trafficx_nstbrowser
    restart: unless-stopped
    profiles:
      - docker-nstbrowser # aktifkan dengan: --profile docker-nstbrowser
    ports:
      - "${NSTBROWSER_PORT:-8848}:8848"
    environment:
      - TOKEN=${NSTBROWSER_API_KEY} # WAJIB diisi
      - PORT=8848
      - DATADIR=/data
    volumes:
      - nstbrowser_data:/data
    shm_size: "2gb"
    networks:
      - antidetect_net
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sf",
          "-H",
          "x-api-key: ${NSTBROWSER_API_KEY}",
          "http://localhost:8848/api/v2/browser/list?page=1&pageSize=1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Provider native (tidak ada Docker image resmi) ───────────
  # Install via scripts/antidetect/install-*.sh
  adspower:
    profiles: [native-only]
    image: alpine:latest
    command: >
      sh -c "echo 'AdsPower = native systemd. Install: bash scripts/antidetect/install-adspower.sh'"

  dolphin:
    profiles: [native-only]
    image: alpine:latest
    command: >
      sh -c "echo 'Dolphin = native AppImage systemd. Install: bash scripts/antidetect/install-dolphin.sh'"

  multilogin:
    profiles: [native-only]
    image: alpine:latest
    command: >
      sh -c "echo 'Multilogin = native systemd. Install: bash scripts/antidetect/install-multilogin.sh'"

volumes:
  nstbrowser_data:
    driver: local

networks:
  antidetect_net:
    driver: bridge
