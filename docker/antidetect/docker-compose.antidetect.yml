# ============================================================
# docker/antidetect/docker-compose.antidetect.yml — FIXED v2
# PERUBAHAN: Nstbrowser TIDAK via Docker Hub (image private)
#            → Gunakan native install via install-nstbrowser.sh
# ============================================================

services:
  # ── Virtual Display (shared untuk semua GUI apps) ───────────
  xvfb:
    image: ubuntu:22.04
    container_name: trafficx_xvfb
    restart: unless-stopped
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq xvfb libgl1-mesa-dri &&
        Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset
      "
    environment:
      - DISPLAY=:99
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    networks:
      - antidetect_net

  # ── CATATAN: Provider berikut TIDAK via Docker Hub ──────────
  # Semua diinstall sebagai native systemd service di VPS:
  #
  #   AdsPower  → install-adspower.sh  (port 50325)
  #   Dolphin   → install-dolphin.sh   (port 3001)
  #   Nstbrowser→ install-nstbrowser.sh (port 8848, .deb binary)
  #   Multilogin→ install-multilogin.sh (port 35000)
  #   GoLogin   → npm install @gologin/gologin (cloud API, no local)
  #
  # Untuk manage service, gunakan:
  #   bash scripts/antidetect/manage.sh status
  #   bash scripts/antidetect/manage.sh restart adspower

  # ── Placeholder profiles (tidak dijalankan) ─────────────────
  adspower:
    profiles: [native-only]
    image: alpine:latest
    command: echo "AdsPower runs as native systemd service"

  dolphin:
    profiles: [native-only]
    image: alpine:latest
    command: echo "Dolphin runs as native systemd AppImage service"

  nstbrowser:
    # DIHAPUS: nstbrowser/agent image tidak tersedia di Docker Hub public
    # Install via: sudo bash scripts/antidetect/install-nstbrowser.sh
    profiles: [native-only]
    image: alpine:latest
    command: echo "Nstbrowser runs as native systemd service (install via .deb)"

  multilogin:
    profiles: [native-only]
    image: alpine:latest
    command: echo "Multilogin runs as native systemd service"

networks:
  antidetect_net:
    driver: bridge
