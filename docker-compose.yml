services:
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: trafficx_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      APP_NAME: ${APP_NAME:-TrafficX}
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      PORT: ${PORT:-3000}
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_SITE_URL}
      NUXT_PUBLIC_APP_NAME: ${APP_NAME}
      DATABASE_URL: ${DATABASE_URL}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_UPLOAD_PRESET: ${CLOUDINARY_UPLOAD_PRESET}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_USE_TLS: ${REDIS_USE_TLS:-false}
      REDIS_DB: ${REDIS_DB:-0}
      RESEND_API_KEY: ${RESEND_API_KEY}
      NUXT_NODEMAILER_AUTH_USER: ${NUXT_NODEMAILER_AUTH_USER}
      NUXT_NODEMAILER_AUTH_PASS: ${NUXT_NODEMAILER_AUTH_PASS}
      NUXT_NODEMAILER_FROM: ${NUXT_NODEMAILER_FROM}
      NUXT_NODEMAILER_HOST: ${NUXT_NODEMAILER_HOST}
      NUXT_NODEMAILER_PORT: ${NUXT_NODEMAILER_PORT}
      NUXT_NODEMAILER_SECURE: ${NUXT_NODEMAILER_SECURE:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      SALES_EMAIL: ${SALES_EMAIL}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      DEMO_EMAIL: ${DEMO_EMAIL}
      DEMO_NAME: ${DEMO_NAME}
      DEMO_PASSWORD: ${DEMO_PASSWORD}
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD}
      APP_CLIENT_SECRET: ${APP_CLIENT_SECRET}
      SANITY_PROJECT_ID: ${SANITY_PROJECT_ID}
      SANITY_DATASET: ${SANITY_DATASET:-production}
      NUXT_SANITY_TOKEN: ${NUXT_SANITY_TOKEN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NUXT_OG_IMAGE_SECRET: ${NUXT_OG_IMAGE_SECRET}
      MIDTRANS_MERCHANT_ID: ${MIDTRANS_MERCHANT_ID}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION:-false}
      XENDIT_SECRET_KEY: ${XENDIT_SECRET_KEY}
      XENDIT_PUBLIC_KEY: ${XENDIT_PUBLIC_KEY}
      XENDIT_WEBHOOK_TOKEN: ${XENDIT_WEBHOOK_TOKEN}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID}
      PAYPAL_MODE: ${PAYPAL_MODE:-production}
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      NUXT_PUBLIC_SENTRY_DSN: ${NUXT_PUBLIC_SENTRY_DSN}
      NUXT_SENTRY_DSN: ${NUXT_SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trafficx_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "trafficx.service=client"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WORKER_ID: ${WORKER_ID:-worker-01}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      MAX_BROWSERS: ${MAX_BROWSERS:-5}
      MAX_CONCURRENT: ${MAX_CONCURRENT:-20}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_REGION: ${WORKER_REGION:-local-1}
      WORKER_REPLICAS: ${WORKER_REPLICAS:-1}
      WORKER_DATABASE_URL: ${WORKER_DATABASE_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-${APP_NAME}-${APP_VERSION:-1.0.0}}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trafficx_net
    # Shared memory untuk Chromium
    shm_size: "2gb"
    # Security: no-new-privileges
    security_opt:
      - no-new-privileges:true
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - "trafficx.service=worker"

  migrator:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trafficx_net
    ports:
      - "127.0.0.1:5555:5555"

  postgres:
    image: postgres:15-alpine
    container_name: trafficx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-traffic_exchange}
      POSTGRES_USER: ${POSTGRES_USER:-trafficx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-trafficx} -d ${POSTGRES_DB:-traffic_exchange}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trafficx_net
    ports:
      - "127.0.0.1:5432:5432" # Only expose to localhost
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: trafficx_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      [
        "sh",
        "-c",
        'redis-server --maxmemory ${REDIS_MAX_MEMORY:-512mb} --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --save 60 10000 $${REDIS_PASSWORD:+--requirepass "$$REDIS_PASSWORD"}',
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli $${REDIS_PASSWORD:+-a "$$REDIS_PASSWORD"} ping | grep PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trafficx_net
    ports:
      - "127.0.0.1:6379:6379"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: trafficx_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trafficx_net

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: trafficx_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-trafficx}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-traffic_exchange}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trafficx_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: trafficx_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-changeme_pgadmin}
      PGADMIN_LISTEN_PORT: 80
      SCRIPT_NAME: /pgadmin
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_MFA_ENABLED: ${PGADMIN_CONFIG_MFA_ENABLED:-True}
      PGADMIN_CONFIG_MFA_SUPPORTED_METHODS: ${PGADMIN_CONFIG_MFA_SUPPORTED_METHODS:-['authenticator']}
      PGADMIN_CONFIG_MFA_FORCE_REGISTRATION: ${PGADMIN_CONFIG_MFA_FORCE_REGISTRATION:-False}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trafficx_net

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: trafficx_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      PGADMIN_HTTP_USER: ${PGADMIN_HTTP_USER}
      PGADMIN_HTTP_PASSWORD: ${PGADMIN_HTTP_PASSWORD}
      PGADMIN_ALLOWED_IPS: ${PGADMIN_ALLOWED_IPS:-}
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - nginx_cache:/var/cache/nginx
    depends_on:
      - client
    networks:
      - trafficx_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: trafficx_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - trafficx_net
    ports:
      - "127.0.0.1:9090:9090"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    image: grafana/grafana:latest
    container_name: trafficx_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: ${APP_URL}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - trafficx_net
    ports:
      - "127.0.0.1:3005:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_cache:
    driver: local
  letsencrypt_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  trafficx_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
